<svg width="960" height="540" viewBox="0 0 960 540" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">SmartDailyApps 404 Illustration</title>
  <desc id="desc">Abstract night sky with floating app cards and a broken path marker.</desc>
  <defs>
    <linearGradient id="bg" x1="120" y1="40" x2="840" y2="500" gradientUnits="userSpaceOnUse">
      <stop stop-color="#18295A"/>
      <stop offset="1" stop-color="#090C1A"/>
    </linearGradient>
    <linearGradient id="accent" x1="260" y1="110" x2="740" y2="430" gradientUnits="userSpaceOnUse">
      <stop stop-color="#4DE2FF"/>
      <stop offset="1" stop-color="#20D1A7"/>
    </linearGradient>
    <filter id="glow" x="-60" y="-60" width="1080" height="660" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="16" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="20" y="20" width="920" height="500" rx="28" fill="url(#bg)"/>
  <circle cx="210" cy="122" r="4" fill="#9AA6C9"/>
  <circle cx="302" cy="80" r="3" fill="#9AA6C9"/>
  <circle cx="780" cy="112" r="4" fill="#9AA6C9"/>
  <circle cx="670" cy="164" r="3" fill="#9AA6C9"/>
  <circle cx="540" cy="88" r="2.5" fill="#9AA6C9"/>

  <path d="M120 380C260 280 340 420 470 340C570 278 690 248 840 300" stroke="#2A3565" stroke-width="6" stroke-linecap="round" stroke-dasharray="10 14"/>

  <g filter="url(#glow)">
    <rect x="178" y="178" width="140" height="180" rx="20" fill="#111D44" stroke="#2A3565"/>
    <rect x="220" y="210" width="56" height="56" rx="14" fill="url(#accent)"/>
    <rect x="206" y="284" width="84" height="10" rx="5" fill="#4B5C91"/>
    <rect x="206" y="304" width="64" height="10" rx="5" fill="#35467A"/>
  </g>

  <g opacity="0.9">
    <rect x="618" y="146" width="170" height="120" rx="22" fill="#111D44" stroke="#2A3565"/>
    <path d="M652 216L680 188L704 210L736 176" stroke="#4DE2FF" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="744" cy="176" r="6" fill="#4DE2FF"/>
  </g>

  <g>
    <circle cx="484" cy="306" r="54" fill="#1A2C61" stroke="#4DE2FF" stroke-width="4"/>
    <path d="M458 306H510" stroke="#4DE2FF" stroke-width="6" stroke-linecap="round"/>
    <path d="M484 280V332" stroke="#4DE2FF" stroke-width="6" stroke-linecap="round"/>
    <circle cx="484" cy="360" r="10" fill="#20D1A7"/>
  </g>

  <text x="480" y="470" text-anchor="middle" fill="#9AA6C9" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="700" letter-spacing="1">Route Missing. Signal Found.</text>
</svg>
